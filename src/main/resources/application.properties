spring.application.name=Library_Management_System
server.port=7777

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_lib}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root@12345}

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

# Use 'update' on empty DB — creates tables. Override on Render only if needed.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
