services:
  mysql:
    image: mysql:8.0
    container_name: student_lib_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-libroot}
      MYSQL_DATABASE: student_lib
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_lib_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-7777}:7777"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/student_lib?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-libroot}
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
